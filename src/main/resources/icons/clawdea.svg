<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13">
  <defs>
    <linearGradient id="coral" x1="10" y1="3" x2="3" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB088"/>
      <stop offset="100%" stop-color="#C8643F"/>
    </linearGradient>
  </defs>

  <!-- Three-stroke claw mark. No plate at this size: the strokes themselves
       carry the silhouette and stay readable on light and dark tool-stripes. -->
  <g stroke="url(#coral)" stroke-width="1.6" stroke-linecap="round" fill="none">
    <line x1="3.2"  y1="10.7" x2="7"   y2="2.6"/>
    <line x1="5.4"  y1="11"   x2="9.2" y2="2.9"/>
    <line x1="7.6"  y1="10.7" x2="10.6" y2="3.2"/>
  </g>
</svg>
